<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>神算牛牛 - 极速算牌</title>
    <style>
        :root {
            --bg-color: #f2f4f8;
            --desktop-bg: #cbd5e1;
            --surface: #ffffff;
            --text-primary: #1c1e21;
            --text-gray: #8a8d91;
            --accent-red: #ff3b30;
            --accent-blue: #007aff;
            --accent-gold: linear-gradient(135deg, #ffd700, #ff8c00);
            --shadow-pop: 6px 6px 12px #e3e5e8, -6px -6px 12px #ffffff;
            --shadow-inset: inset 4px 4px 8px #e3e5e8, inset -4px -4px 8px #ffffff;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }

        html { background-color: var(--desktop-bg); display: flex; justify-content: center; align-items: center; height: 100%; }

        body {
            margin: 0; width: 100%; max-width: 430px; height: 100dvh; max-height: 900px;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            position: relative; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 20px;
        }

        @media (max-width: 480px) {
            html { background-color: var(--bg-color); display: block; }
            body { max-width: 100%; max-height: none; box-shadow: none; border-radius: 0; }
        }

        .display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 10px; }
        .brand { font-size: 1.5rem; font-weight: 900; color: var(--text-primary); margin-bottom: 15px; letter-spacing: 1px; }
        .brand span { color: var(--accent-red); }

        .slots-container { 
            display: flex; gap: 10px; width: 100%; max-width: 380px; 
            justify-content: center; align-items: center; margin-bottom: 20px;
            min-height: 190px; transition: all 0.3s ease;
        }
        .slots-container.result-mode { flex-direction: column; gap: 15px; }
        
        .card-row { display: flex; gap: 10px; justify-content: center; animation: fadeUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .slot {
            width: 55px; height: 77px; border-radius: 8px; position: relative;
            background: var(--bg-color); box-shadow: var(--shadow-inset);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800; color: var(--text-primary);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .slot.filled { background: var(--surface); box-shadow: var(--shadow-pop); transform: translateY(-2px); cursor: pointer; }
        .slot.filled:active { transform: scale(0.9); box-shadow: var(--shadow-inset); }
        .slot.red { color: var(--accent-red); }
        .slot.blue { color: var(--accent-blue); }

        .badge {
            position: absolute; top: -8px; right: -8px; background: var(--accent-red); color: white;
            font-size: 0.65rem; padding: 2px 6px; border-radius: 8px;
            box-shadow: 0 2px 4px rgba(255, 59, 48, 0.4); animation: fadeUp 0.3s ease 0.2s both;
        }

        .result-area { min-height: 85px; width: 100%; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* 结果文案基础样式 */
        .result-title { font-size: 1.8rem; font-weight: 900; margin: 0; opacity: 0; display: none; text-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .result-title.show { display: block; opacity: 1; }
        
        /* 颜色分级体系 */
        .color-gray { color: var(--text-gray); }
        .color-normal { color: var(--text-primary); }
        .color-red { color: var(--accent-red); }
        .color-gold { background: var(--accent-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 12px rgba(255,140,0,0.3); font-size: 2.2rem; }

        /* 特效动画分级 */
        .anim-shake { animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
        .anim-pop { animation: popNormal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .anim-bounce { animation: bounceStrong 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .anim-explode { animation: explode 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popNormal { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        @keyframes bounceStrong { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.1); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
        @keyframes explode { 0% { opacity: 0; transform: scale(0.5); } 60% { opacity: 1; transform: scale(1.2); text-shadow: 0 10px 20px rgba(255,140,0,0.5); } 100% { transform: scale(1); } }

        .reset-btn {
            margin-top: 10px; padding: 10px 28px; border-radius: 20px; background: var(--text-primary); color: white;
            font-weight: bold; font-size: 1rem; opacity: 0; pointer-events: none; transform: translateY(10px);
            transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: none; outline: none; cursor: pointer;
        }
        .reset-btn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .reset-btn:active { transform: scale(0.95); }

        .keyboard {
            background: var(--surface); border-radius: 24px 24px 0 0; padding: 25px 15px calc(20px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 30px rgba(0,0,0,0.03); margin: 0 -20px; flex-shrink: 0;
        }
        
        .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 420px; margin: 0 auto; }
        
        .key-btn {
            aspect-ratio: 1; border-radius: 12px; background: var(--surface); box-shadow: var(--shadow-pop);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: var(--text-primary);
            transition: all 0.1s ease; cursor: pointer; border: none; outline: none;
        }
        .key-btn:active { box-shadow: var(--shadow-inset); transform: scale(0.96); }
        .key-btn.special-red { color: var(--accent-red); font-size: 1.6rem; font-weight: 900; }
        .key-btn.special-blue { color: var(--accent-blue); }
        .key-grid.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(100%); transition: all 0.3s ease; }
        
        .key-row-bottom { display: flex; justify-content: center; align-items: flex-start; gap: 12px; margin-top: 12px; }
        .key-row-bottom .key-btn { width: calc(20% - 10px); aspect-ratio: 1; }
    </style>
</head>
<body>

    <div class="display-board">
        <div class="brand">神算<span>牛牛</span></div>
        <div class="slots-container" id="slots"></div>
        <div class="result-area">
            <h2 class="result-title" id="resultTitle">--</h2>
            <button class="reset-btn" id="resetBtn" onclick="resetGame()">下一局</button>
        </div>
    </div>

    <div class="keyboard">
        <div class="key-grid" id="keyboard">
            <button class="key-btn" onclick="addCard('A', 1)">A</button>
            <button class="key-btn" onclick="addCard('2', 2)">2</button>
            <button class="key-btn special-red" onclick="addCard('3', 3)">3</button>
            <button class="key-btn" onclick="addCard('4', 4)">4</button>
            <button class="key-btn" onclick="addCard('5', 5)">5</button>
            <button class="key-btn special-red" onclick="addCard('6', 6)">6</button>
            <button class="key-btn" onclick="addCard('7', 7)">7</button>
            <button class="key-btn" onclick="addCard('8', 8)">8</button>
            <button class="key-btn" onclick="addCard('9', 9)">9</button>
            <button class="key-btn" onclick="addCard('10', 10)">10</button>
        </div>
        <div class="key-row-bottom" id="keyboardBottom">
            <button class="key-btn special-blue" onclick="addCard('J', 10)">J</button>
            <button class="key-btn special-blue" onclick="addCard('Q', 10)">Q</button>
            <button class="key-btn special-blue" onclick="addCard('K', 10)">K</button>
        </div>
    </div>

    <script>
        let state = { cards: [] };
        const DOM = {
            slots: document.getElementById('slots'),
            resultTitle: document.getElementById('resultTitle'),
            resetBtn: document.getElementById('resetBtn'),
            keyboard: document.getElementById('keyboard'),
            keyboardBottom: document.getElementById('keyboardBottom')
        };

        const vibrate = (ms) => { if (navigator.vibrate) navigator.vibrate(ms); };

        function addCard(name, value) {
            if (state.cards.length >= 5) return;
            vibrate(30);
            
            let uniqueId = Date.now().toString() + Math.floor(Math.random() * 10000);
            state.cards.push({ name, value, id: uniqueId });
            
            if (state.cards.length === 5) {
                DOM.keyboard.classList.add('disabled');
                DOM.keyboardBottom.style.opacity = '0.5';
                DOM.keyboardBottom.style.pointerEvents = 'none';
                calculateAndShow();
            } else {
                renderPickingState();
            }
        }

        function removeCard(id) {
            vibrate(20);
            state.cards = state.cards.filter(c => c.id !== id);
            
            DOM.slots.classList.remove('result-mode');
            DOM.keyboard.classList.remove('disabled');
            DOM.keyboardBottom.style.opacity = '1';
            DOM.keyboardBottom.style.pointerEvents = 'auto';
            DOM.resultTitle.className = 'result-title';
            DOM.resetBtn.classList.remove('show');
            
            renderPickingState();
        }

        function resetGame() {
            vibrate([30, 50]);
            state.cards = [];
            DOM.slots.classList.remove('result-mode');
            DOM.keyboard.classList.remove('disabled');
            DOM.keyboardBottom.style.opacity = '1';
            DOM.keyboardBottom.style.pointerEvents = 'auto';
            DOM.resultTitle.className = 'result-title';
            DOM.resetBtn.classList.remove('show');
            renderPickingState();
        }

        function getCardHTML(c, isClickable = false) {
            let colorClass = '';
            if (c.name === '3' || c.name === '6') colorClass = 'red';
            if (['J', 'Q', 'K'].includes(c.name)) colorClass = 'blue';
            let badge = c.mutated ? `<div class="badge">${c.mutated}</div>` : '';
            let clickAttr = isClickable ? `onclick="removeCard('${c.id}')"` : '';
            return `<div class="slot filled ${colorClass}" ${clickAttr}>${c.name}${badge}</div>`;
        }

        function renderPickingState() {
            DOM.slots.classList.remove('result-mode');
            let html = '';
            for (let i = 0; i < 5; i++) {
                if (state.cards[i]) {
                    html += getCardHTML(state.cards[i], true);
                } else {
                    html += `<div class="slot"></div>`;
                }
            }
            DOM.slots.innerHTML = html;
        }

        function getVariations(cards) {
            let variations = [[]];
            for (let card of cards) {
                let opts = [{ ...card, val: card.value }];
                if (card.name === '3') opts.push({ ...card, val: 6, mutated: '当6' });
                if (card.name === '6') opts.push({ ...card, val: 3, mutated: '当3' });
                
                let next = [];
                for (let v of variations) {
                    for (let o of opts) next.push([...v, o]);
                }
                variations = next;
            }
            return variations;
        }

        function calculateAndShow() {
            const isFiveGong = state.cards.every(c => ['J', 'Q', 'K'].includes(c.name));
            if (isFiveGong) {
                return applyResultView("👑 满堂红！金牛 (五公) 👑", "color-gold", "anim-explode", true, state.cards.slice(3, 5), state.cards.slice(0, 3));
            }

            const allVars = getVariations(state.cards);
            let bestScore = -1, finalBase = [], finalPoints = [];

            for (let v of allVars) {
                for (let i = 0; i < 3; i++) {
                    for (let j = i + 1; j < 4; j++) {
                        for (let k = j + 1; k < 5; k++) {
                            let sum3 = v[i].val + v[j].val + v[k].val;
                            if (sum3 % 10 === 0) {
                                let pts = v.filter((_, idx) => idx !== i && idx !== j && idx !== k);
                                let sum2 = (pts[0].val + pts[1].val) % 10;
                                let score = sum2 === 0 ? 10 : sum2;
                                if (score > bestScore) {
                                    bestScore = score; finalBase = [v[i], v[j], v[k]]; finalPoints = pts;
                                }
                            }
                        }
                    }
                }
            }

            // 情绪文案与颜色引擎映射
            if (bestScore === -1) {
                applyResultView("💸 凉凉！没牛", "color-gray", "anim-shake", false, [], state.cards);
            } else if (bestScore === 10) {
                applyResultView("🧨 霸气通杀！牛牛 🧨", "color-gold", "anim-explode", true, finalPoints, finalBase);
            } else {
                const textMap = {
                    1: "🤏 险过剃头！牛 1", 2: "🐢 顶住啊！牛 2", 3: "🥺 勉强及格！牛 3",
                    4: "🛡️ 防守牌！牛 4", 5: "🤔 有得拼！牛 5", 6: "💪 坐和望赢！牛 6",
                    7: "🤩 漂亮起飞！牛 7", 8: "💰 准备收钱！牛 8", 9: "🚀 赢到笑！牛 9"
                };
                
                let text = textMap[bestScore];
                let colorCls = bestScore <= 6 ? "color-normal" : "color-red";
                let animCls = bestScore <= 6 ? "anim-pop" : "anim-bounce";
                
                applyResultView(text, colorCls, animCls, false, finalPoints, finalBase);
            }
        }

        // 终极 UI 渲染引擎
        function applyResultView(text, colorClass, animClass, isPremium, topCards, bottomCards) {
            vibrate(isPremium ? [50, 50, 100] : (topCards.length > 0 ? 100 : [30, 30])); 
            
            if (topCards.length > 0 && bottomCards.length === 3) {
                DOM.slots.classList.add('result-mode'); 
                DOM.slots.innerHTML = `
                    <div class="card-row">
                        ${topCards.map(c => getCardHTML(c, true)).join('')}
                    </div>
                    <div class="card-row">
                        ${bottomCards.map(c => getCardHTML(c, true)).join('')}
                    </div>
                `;
            } else {
                DOM.slots.classList.remove('result-mode');
                DOM.slots.innerHTML = bottomCards.map(c => getCardHTML(c, true)).join('');
            }

            // 重置 DOM 以确保每次都能触发动画
            DOM.resultTitle.className = `result-title`; 
            void DOM.resultTitle.offsetWidth; 
            
            DOM.resultTitle.innerText = text;
            DOM.resultTitle.className = `result-title show ${colorClass} ${animClass}`;
            
            setTimeout(() => { DOM.resetBtn.classList.add('show'); }, 300);
        }

        renderPickingState();
    </script>
</body>
</html>
